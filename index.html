<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Contador</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="icon" href="https://images.icon-icons.com" type="image/png">
</head>
<body class="bg-light">

    <!-- Navbar Adaptada: Sem menu escondido, links sempre visíveis -->
    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container-fluid justify-content-start">
            <!-- Link Contador (Ativo) -->
            <a class="navbar-brand bg-secondary bg-opacity-25 border-start border-2 border-secondary px-3 me-3" href="index.html">Contador</a>
            <!-- Link Tabuada (Sempre Visível) -->
            <a class="nav-link text-white-50" href="Tabuada index.html">Tabuada</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h5 class="mb-0">Contador Inteligente</h5>
            </div>
            <div class="card-body">
                <table class="table table-bordered align-middle">
                    <tbody>
                        <tr>
                            <td class="w-25 fw-bold">Início</td>
                            <td><input type="number" id="txtInicio" class="form-control border-secondary shadow-sm" min="0" placeholder="0"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold">Fim</td>
                            <td><input type="number" id="txtFim" class="form-control border-secondary shadow-sm" min="0" placeholder="0"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold">Passo</td>
                            <td><input type="number" id="txtPasso" class="form-control border-secondary shadow-sm" min="0" placeholder="1"></td>
                        </tr>
                    </tbody>
                </table>

                <button class="btn btn-secondary w-100 shadow mt-2 fw-bold" onclick="contar()">
                    Calcular Contagem
                </button>

                <!-- Área de Resultado com borda lateral -->
                <div class="mt-4 p-4 bg-secondary bg-opacity-25 border-start border-4 border-secondary text-dark shadow-sm">
                    <div id="displayResultado" class="fs-5 fw-bold text-break text-center">Aguardando dados...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net"></script>
    <script src="contador.js"></script>
</body>
</html>
