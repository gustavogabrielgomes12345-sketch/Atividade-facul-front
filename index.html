<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade teste Front Ending</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<link rel="icon" href="https://images.icon-icons.com/66/PNG/128/tools_theactivity_themonitor_13009.png"
    type="image/png">

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand bg-secondary bg-opacity-25 border-start border-2 border-secondary px-3"
                href="index.html">Contador</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="Tabuada index.html">Tabuada</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h5 class="mb-0">Contador Inteligente</h5>
            </div>

            <table class="table table-bordered align-middle">
                <tbody>
                    <tr>
                        <td class="w-25">Início</td>
                        <td><input type="number" id="txtInicio" class="form-control border-secondary shadow-sm" min="0"></td>
                    </tr>
                    <tr>
                        <td>Fim</td>
                        <td><input type="number" id="txtFim" class="form-control border-secondary shadow-sm" min="0"></td>
                    </tr>
                    <tr>
                        <td>Passo</td>
                        <td><input type="number" id="txtPasso" class="form-control border-secondary shadow-sm" min="0"></td>
                    </tr>
                </tbody>
            </table>


            <button class="btn btn-secondary w-100 shadow mt-2" onclick="contar()">
                Calcular Contagem
            </button>

            <div class="mt-4 p-4 bg-secondary bg-opacity-25 border-start border-4 border-secondary text-dark shadow-sm">
                <div id="displayResultado" class="fs-5 fw-bold text-break">Aguardando dados...</div>
            </div>

            <script src="https://cdn.jsdelivr.net"></script>
            <script src="contador.js"></script>

</body>

</html>
