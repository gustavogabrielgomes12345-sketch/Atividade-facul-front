<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Tabuada</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="icon" href="https://images.icon-icons.com" type="image/png">
</head>
<body class="bg-light">

    <!-- Navbar Adaptada: Sem menu escondido, links sempre visíveis -->
    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container-fluid justify-content-start">
            <!-- Link Contador -->
            <a class="navbar-brand px-3 me-3 text-white-50 fs-6" href="index.html">Contador</a>
            <!-- Link Tabuada (Ativo com sua estética) -->
            <a class="nav-link active bg-secondary bg-opacity-25 border-start border-2 border-secondary px-3 text-white" href="Tabuada index.html">Tabuada</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h5 class="mb-0">Gerador de Tabuada</h5>
            </div>
            <div class="card-body text-center">
                <div class="row g-2 align-items-center justify-content-center mb-4">
                    <div class="col-12 col-sm-auto">
                        <label for="txtNum" class="fw-bold">Número:</label>
                    </div>
                    <div class="col-8 col-sm-3">
                        <input type="number" id="txtNum" class="form-control border-secondary shadow-sm" placeholder="Ex: 5" min="0">
                    </div>
                    <div class="col-4 col-sm-auto">
                        <button class="btn btn-secondary shadow-sm w-100" onclick="gerarTabuada()">Gerar</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-striped align-middle shadow-sm">
                        <thead class="table-dark text-center">
                            <tr>
                                <th>(+)</th>
                                <th>(-)</th>
                                <th>(x)</th>
                                <th>(÷)</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabuada" class="text-center">
                            <tr>
                                <td colspan="4" class="text-muted small">Digite um número acima...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net"></script>
    <script src="tabuada.js"></script>
</body>
</html>
